<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>F1 Predictor</title>
</head>
<body>
    <h1>F1 Race Predictor</h1>
    <form method="POST">
    <input type="number" step="1" name="grid" placeholder="Grid Position" required>
    <input type="number" step="0.1" name="points" placeholder="Points" required>
    <input type="number" step="0.1" name="pit_time" placeholder="Total Pit Time" required>
    <input type="number" step="0.1" name="temp" placeholder="Avg Air Temp" required>
    <button type="submit">Predict</button>
</form>
    
    {% if prediction %}
        <h2 style="color: yellow; text-shadow: 2px 2px 4px #000;">{{ prediction }}</h2>
    {% endif %}
</body>
</html>
